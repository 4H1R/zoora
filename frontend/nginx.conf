server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    server_tokens off;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml application/manifest+json application/wasm image/svg+xml;

    # Same-origin API: forward /api to the Go service, preserving Host so the
    # tenant middleware resolves the org from the subdomain.
    location /api/ {
        proxy_pass http://api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Hashed build assets — cache hard.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;

        # nginx's bundled mime.types has no .mjs entry, so ES module workers
        # (pdf.js pdf.worker.min.mjs) get served as application/octet-stream.
        # The browser's strict module-script MIME check then rejects them — and
        # with the PWA service worker in the fetch path it surfaces as
        # "A ServiceWorker intercepted the request and encountered an
        # unexpected error." Serve .mjs as JS so module workers load.
        location ~ \.mjs$ {
            types { }
            default_type text/javascript;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # Service worker must always be revalidated, otherwise browsers may serve a
    # stale sw.js and clients never pick up new deploys. Same for the manifest.
    location = /sw.js {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }
    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # index.html is the app shell — it references the hashed /assets/ bundles.
    # It must NEVER be cached hard, or browsers serve a stale shell pointing at
    # old assets and clients get stuck on an old build until a hard refresh
    # (impossible on most mobile browsers). Always revalidate.
    location = /index.html {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # SPA fallback — every unknown path serves index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
