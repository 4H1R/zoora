# Supply-chain guard: only install package versions published at least
# 3 days (4320 minutes) ago. Applies to all deps, including transitive.
minimumReleaseAge: 4320

allowBuilds:
  '@firebase/util': false
  esbuild: true
  msw: true
  protobufjs: false

patchedDependencies:
  '@tldraw/editor@5.1.1': patches/@tldraw__editor@5.1.1.patch
