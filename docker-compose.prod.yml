services:
  traefik:
    image: traefik:v3.1
    restart: unless-stopped
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --certificatesresolvers.le.acme.email=${ACME_EMAIL}
      - --certificatesresolvers.le.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.le.acme.tlschallenge=true
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "letsencrypt:/letsencrypt"
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    networks: [zoora]

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: "https://api.${DOMAIN}"
    image: zoora-frontend:latest
    restart: unless-stopped
    networks: [zoora]
    labels:
      - traefik.enable=true
      - traefik.http.routers.frontend.rule=Host(`app.${DOMAIN}`)
      - traefik.http.routers.frontend.entrypoints=websecure
      - traefik.http.routers.frontend.tls.certresolver=le
      - traefik.http.services.frontend.loadbalancer.server.port=80

  api:
    build:
      context: .
    image: zoora-backend:latest
    command: ["api"]
    restart: unless-stopped
    env_file: [.env.prod]
    environment:
      ENVIRONMENT: production
      DATABASE_URL: "postgres://${DB_USERNAME}:${DB_PASSWORD}@pgsql:5432/${DB_DATABASE}?sslmode=disable"
      REDIS_URL: "redis://redis:6379"
      LIVEKIT_HOST: "http://livekit:7880"
      LIVEKIT_PUBLIC_URL: "wss://livekit.${DOMAIN}"
      S3_ENDPOINT: "https://s3.${DOMAIN}"
      CORS_ALLOWED_ORIGINS: "https://app.${DOMAIN}"
    depends_on:
      pgsql: {condition: service_healthy}
      redis: {condition: service_healthy}
      migrate: {condition: service_completed_successfully}
      bucket-init: {condition: service_completed_successfully}
    networks: [zoora]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    labels:
      - traefik.enable=true
      - traefik.http.routers.api.rule=Host(`api.${DOMAIN}`)
      - traefik.http.routers.api.entrypoints=websecure
      - traefik.http.routers.api.tls.certresolver=le
      - traefik.http.services.api.loadbalancer.server.port=8080

  worker:
    image: zoora-backend:latest
    command: ["worker"]
    restart: unless-stopped
    env_file: [.env.prod]
    environment:
      ENVIRONMENT: production
      DATABASE_URL: "postgres://${DB_USERNAME}:${DB_PASSWORD}@pgsql:5432/${DB_DATABASE}?sslmode=disable"
      REDIS_URL: "redis://redis:6379"
      LIVEKIT_HOST: "http://livekit:7880"
      LIVEKIT_PUBLIC_URL: "wss://livekit.${DOMAIN}"
      S3_ENDPOINT: "https://s3.${DOMAIN}"
    depends_on:
      pgsql: {condition: service_healthy}
      redis: {condition: service_healthy}
      migrate: {condition: service_completed_successfully}
    networks: [zoora]

  migrate:
    image: migrate/migrate:latest
    restart: "no"
    command:
      - "-path"
      - "/migrations"
      - "-database"
      - "postgres://${DB_USERNAME}:${DB_PASSWORD}@pgsql:5432/${DB_DATABASE}?sslmode=disable"
      - "up"
    volumes:
      - "./migrations:/migrations:ro"
    depends_on:
      pgsql: {condition: service_healthy}
    networks: [zoora]

  bucket-init:
    image: amazon/aws-cli:latest
    restart: "no"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - "aws --endpoint-url http://rustfs:9000 s3 mb s3://${S3_BUCKET} || true"
    environment:
      AWS_ACCESS_KEY_ID: "${S3_ACCESS_KEY}"
      AWS_SECRET_ACCESS_KEY: "${S3_SECRET_KEY}"
      AWS_DEFAULT_REGION: "${S3_REGION:-us-east-1}"
    depends_on:
      rustfs: {condition: service_healthy}
    networks: [zoora]

  seed:
    image: zoora-backend:latest
    command: ["seed"]
    profiles: ["seed"]
    env_file: [.env.prod]
    environment:
      ENVIRONMENT: production
      DATABASE_URL: "postgres://${DB_USERNAME}:${DB_PASSWORD}@pgsql:5432/${DB_DATABASE}?sslmode=disable"
      REDIS_URL: "redis://redis:6379"
      LIVEKIT_HOST: "http://livekit:7880"
      S3_ENDPOINT: "https://s3.${DOMAIN}"
    depends_on:
      migrate: {condition: service_completed_successfully}
    networks: [zoora]

  pgsql:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: "${DB_DATABASE}"
      POSTGRES_USER: "${DB_USERNAME}"
      POSTGRES_PASSWORD: "${DB_PASSWORD}"
    volumes:
      - "pgsql-data:/var/lib/postgresql"
    networks: [zoora]
    healthcheck:
      test: ["CMD", "pg_isready", "-q", "-d", "${DB_DATABASE}", "-U", "${DB_USERNAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - "redis-data:/data"
    networks: [zoora]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rustfs:
    image: rustfs/rustfs:latest
    restart: unless-stopped
    environment:
      RUSTFS_VOLUMES: /data
      RUSTFS_ADDRESS: "0.0.0.0:9000"
      RUSTFS_ACCESS_KEY: "${S3_ACCESS_KEY}"
      RUSTFS_SECRET_KEY: "${S3_SECRET_KEY}"
      RUSTFS_EXTERNAL_ADDRESS: "https://s3.${DOMAIN}"
      RUSTFS_CORS_ALLOWED_ORIGINS: "https://app.${DOMAIN}"
      RUSTFS_LOG_LEVEL: info
    volumes:
      - "rustfs-data:/data"
    networks: [zoora]
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -f http://127.0.0.1:9000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - traefik.enable=true
      - traefik.http.routers.s3.rule=Host(`s3.${DOMAIN}`)
      - traefik.http.routers.s3.entrypoints=websecure
      - traefik.http.routers.s3.tls.certresolver=le
      - traefik.http.services.s3.loadbalancer.server.port=9000

  livekit:
    image: livekit/livekit-server:latest
    restart: unless-stopped
    command: ["--config", "/etc/livekit.yaml"]
    environment:
      LIVEKIT_KEYS: "${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}"
    volumes:
      - "./deploy/livekit.yaml:/etc/livekit.yaml:ro"
    ports:
      - "7881:7881"
      - "7882:7882/udp"
    depends_on:
      redis: {condition: service_healthy}
    networks: [zoora]
    labels:
      - traefik.enable=true
      - traefik.http.routers.livekit.rule=Host(`livekit.${DOMAIN}`)
      - traefik.http.routers.livekit.entrypoints=websecure
      - traefik.http.routers.livekit.tls.certresolver=le
      - traefik.http.services.livekit.loadbalancer.server.port=7880

networks:
  zoora:
    driver: bridge

volumes:
  pgsql-data:
  redis-data:
  rustfs-data:
  letsencrypt:
