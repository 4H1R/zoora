services:
  # TLS + routing handled by the host's Caddy (see deploy/Caddyfile). Each
  # service below publishes its port on 127.0.0.1 so only Caddy can reach it.
  # To run the bundled Traefik instead, uncomment this and drop the host ports.
  # traefik:
  #   image: traefik:v3.1
  #   restart: unless-stopped
  #   command:
  #     - --providers.docker=true
  #     - --providers.docker.exposedbydefault=false
  #     - --entrypoints.web.address=:80
  #     - --entrypoints.websecure.address=:443
  #     - --entrypoints.web.http.redirections.entrypoint.to=websecure
  #     - --entrypoints.web.http.redirections.entrypoint.scheme=https
  #     - --certificatesresolvers.le.acme.email=${ACME_EMAIL}
  #     - --certificatesresolvers.le.acme.storage=/letsencrypt/acme.json
  #     - --certificatesresolvers.le.acme.tlschallenge=true
  #     - --providers.file.filename=/etc/traefik/dynamic.yml
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - "letsencrypt:/letsencrypt"
  #     - "/var/run/docker.sock:/var/run/docker.sock:ro"
  #     - "./traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro"
  #     - "./traefik/certs:/certs:ro"
  #   networks: [zoora]

  frontend:
    build:
      context: ./frontend
      args:
        VITE_BASE_DOMAIN: ${DOMAIN}
        VITE_ADMIN_SUBDOMAIN: admin
    image: zoora-frontend:latest
    restart: unless-stopped
    networks: [zoora]
    # Caddy proxies every <slug>.<domain> here; nginx serves the SPA.
    ports:
      - "127.0.0.1:8081:80"
    # Traefik routing (re-enable with the traefik service; drop the ports above).
    # labels:
    #   - traefik.enable=true
    #   # Wildcard host: every tenant subdomain + admin + the canonical www serve the SPA.
    #   - traefik.http.routers.frontend.rule=HostRegexp(`^[a-z0-9-]+\.${DOMAIN}$`)
    #   - traefik.http.routers.frontend.entrypoints=websecure
    #   - traefik.http.routers.frontend.tls=true
    #   - traefik.http.services.frontend.loadbalancer.server.port=80
    #   # Apex (root domain) → www canonical 301. Keeps cookies off the apex,
    #   # which would otherwise leak to every tenant subdomain.
    #   - traefik.http.routers.apex-redirect.rule=Host(`${DOMAIN}`)
    #   - traefik.http.routers.apex-redirect.entrypoints=websecure
    #   - traefik.http.routers.apex-redirect.tls.certresolver=le
    #   - traefik.http.routers.apex-redirect.middlewares=apex-to-www
    #   - traefik.http.middlewares.apex-to-www.redirectregex.regex=^https?://[^/]+/(.*)
    #   - traefik.http.middlewares.apex-to-www.redirectregex.replacement=https://www.${DOMAIN}/$${1}
    #   - traefik.http.middlewares.apex-to-www.redirectregex.permanent=true

  api:
    build:
      context: .
    image: zoora-backend:latest
    command: ["api"]
    restart: unless-stopped
    env_file: [.env.prod]
    environment:
      ENVIRONMENT: production
      DATABASE_URL: "postgres://${DB_USERNAME}:${DB_PASSWORD}@pgsql:5432/${DB_DATABASE}?sslmode=disable"
      REDIS_URL: "redis://redis:6379"
      LIVEKIT_HOST: "http://livekit:7880"
      LIVEKIT_PUBLIC_URL: "wss://livekit.${DOMAIN}"
      S3_ENDPOINT: "http://rustfs:9000"
      S3_PUBLIC_ENDPOINT: "https://s3.${DOMAIN}"
      BASE_DOMAIN: "${DOMAIN}"
      ADMIN_SUBDOMAIN: "admin"
    depends_on:
      pgsql: {condition: service_healthy}
      redis: {condition: service_healthy}
      migrate: {condition: service_completed_successfully}
      bucket-init: {condition: service_completed_successfully}
    networks: [zoora]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    # Caddy routes /api/* here directly; also the on-demand-TLS `ask` target.
    ports:
      - "127.0.0.1:8080:8080"
    # Traefik routing (re-enable with the traefik service; drop the ports above).
    # labels:
    #   - traefik.enable=true
    #   # Same wildcard host as the SPA, but /api takes priority and routes to Go.
    #   - traefik.http.routers.api.rule=HostRegexp(`^[a-z0-9-]+\.${DOMAIN}$`) && PathPrefix(`/api`)
    #   - traefik.http.routers.api.priority=100
    #   - traefik.http.routers.api.entrypoints=websecure
    #   - traefik.http.routers.api.tls=true
    #   - traefik.http.services.api.loadbalancer.server.port=8080

  # Processes Asynq tasks and runs the periodic scheduler (@every 5m stale-room
  # auto-close). Required for attendance auto-mark, no-host delayed close, and
  # stale-room sweep — all enqueue tasks that sit unconsumed without this.
  worker:
    image: zoora-backend:latest
    command: ["worker"]
    restart: unless-stopped
    env_file: [.env.prod]
    environment:
      ENVIRONMENT: production
      DATABASE_URL: "postgres://${DB_USERNAME}:${DB_PASSWORD}@pgsql:5432/${DB_DATABASE}?sslmode=disable"
      REDIS_URL: "redis://redis:6379"
      LIVEKIT_HOST: "http://livekit:7880"
      LIVEKIT_PUBLIC_URL: "wss://livekit.${DOMAIN}"
      S3_ENDPOINT: "http://rustfs:9000"
      S3_PUBLIC_ENDPOINT: "https://s3.${DOMAIN}"
      BASE_DOMAIN: "${DOMAIN}"
      ADMIN_SUBDOMAIN: "admin"
    depends_on:
      pgsql: {condition: service_healthy}
      redis: {condition: service_healthy}
      migrate: {condition: service_completed_successfully}
      api: {condition: service_started}
    networks: [zoora]

  migrate:
    image: migrate/migrate:latest
    restart: "no"
    # DATABASE_URL lets `make prod-migrate-reset` override the entrypoint and
    # run drop+up without re-deriving the DSN; normal `up` uses `command` below.
    environment:
      DATABASE_URL: "postgres://${DB_USERNAME}:${DB_PASSWORD}@pgsql:5432/${DB_DATABASE}?sslmode=disable"
    command:
      - "-path"
      - "/migrations"
      - "-database"
      - "postgres://${DB_USERNAME}:${DB_PASSWORD}@pgsql:5432/${DB_DATABASE}?sslmode=disable"
      - "up"
    volumes:
      - "./migrations:/migrations:ro"
    depends_on:
      pgsql: {condition: service_healthy}
    networks: [zoora]

  bucket-init:
    image: amazon/aws-cli:latest
    restart: "no"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - "aws --endpoint-url http://rustfs:9000 s3 mb s3://${S3_BUCKET} || true"
    environment:
      AWS_ACCESS_KEY_ID: "${S3_ACCESS_KEY}"
      AWS_SECRET_ACCESS_KEY: "${S3_SECRET_KEY}"
      AWS_DEFAULT_REGION: "${S3_REGION:-us-east-1}"
    depends_on:
      rustfs: {condition: service_healthy}
    networks: [zoora]

  seed:
    image: zoora-backend:latest
    command: ["seed"]
    profiles: ["seed"]
    env_file: [.env.prod]
    environment:
      ENVIRONMENT: production
      DATABASE_URL: "postgres://${DB_USERNAME}:${DB_PASSWORD}@pgsql:5432/${DB_DATABASE}?sslmode=disable"
      REDIS_URL: "redis://redis:6379"
      LIVEKIT_HOST: "http://livekit:7880"
      S3_ENDPOINT: "http://rustfs:9000"
      S3_PUBLIC_ENDPOINT: "https://s3.${DOMAIN}"
    depends_on:
      migrate: {condition: service_completed_successfully}
    networks: [zoora]

  pgsql:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: "${DB_DATABASE}"
      POSTGRES_USER: "${DB_USERNAME}"
      POSTGRES_PASSWORD: "${DB_PASSWORD}"
    volumes:
      - "pgsql-data:/var/lib/postgresql"
    networks: [zoora]
    healthcheck:
      test: ["CMD", "pg_isready", "-q", "-d", "${DB_DATABASE}", "-U", "${DB_USERNAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - "redis-data:/data"
    networks: [zoora]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rustfs:
    image: rustfs/rustfs:latest
    restart: unless-stopped
    environment:
      RUSTFS_VOLUMES: /data
      RUSTFS_ADDRESS: "0.0.0.0:9000"
      RUSTFS_ACCESS_KEY: "${S3_ACCESS_KEY}"
      RUSTFS_SECRET_KEY: "${S3_SECRET_KEY}"
      RUSTFS_EXTERNAL_ADDRESS: "https://s3.${DOMAIN}"
      RUSTFS_CORS_ALLOWED_ORIGINS: "https://app.${DOMAIN}"
      RUSTFS_CONSOLE_ENABLE: "true"
      RUSTFS_CONSOLE_ADDRESS: "0.0.0.0:9001"
      RUSTFS_CONSOLE_CORS_ALLOWED_ORIGINS: "https://console.${DOMAIN}"
      RUSTFS_LOG_LEVEL: info
    volumes:
      - "rustfs-data:/data"
    networks: [zoora]
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -f http://127.0.0.1:9000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # Caddy proxies s3.<domain> here for presigned-URL traffic,
    # console.<domain> to the admin console on 9001.
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    # Traefik routing (re-enable with the traefik service; drop the ports above).
    # labels:
    #   - traefik.enable=true
    #   - traefik.http.routers.s3.rule=Host(`s3.${DOMAIN}`)
    #   - traefik.http.routers.s3.entrypoints=websecure
    #   - traefik.http.routers.s3.tls.certresolver=le
    #   - traefik.http.services.s3.loadbalancer.server.port=9000

  livekit:
    image: livekit/livekit-server:latest
    restart: unless-stopped
    command: ["--config", "/etc/livekit.yaml"]
    environment:
      LIVEKIT_KEYS: "${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}"
    volumes:
      - "./deploy/livekit.yaml:/etc/livekit.yaml:ro"
    ports:
      # WebRTC media: direct on the host, not via Caddy.
      - "7881:7881"
      - "7882:7882/udp"
      # Signaling (wss): Caddy proxies livekit.<domain> here.
      - "127.0.0.1:7880:7880"
    depends_on:
      redis: {condition: service_healthy}
    networks: [zoora]
    # Traefik routing (re-enable with the traefik service; drop the 7880 port above).
    # labels:
    #   - traefik.enable=true
    #   - traefik.http.routers.livekit.rule=Host(`livekit.${DOMAIN}`)
    #   - traefik.http.routers.livekit.entrypoints=websecure
    #   - traefik.http.routers.livekit.tls.certresolver=le
    #   - traefik.http.services.livekit.loadbalancer.server.port=7880

  # Records rooms (StartRoomCompositeEgress). Joins the LiveKit server over the
  # shared Redis bus, renders in headless Chrome, and uploads the MP4 straight to
  # rustfs. Without this, POST /live-rooms/:id/recordings hangs → 502.
  # Config is inlined so compose interpolates the secrets from .env.prod — nothing
  # sensitive is committed to a file.
  egress:
    image: livekit/egress:latest
    restart: unless-stopped
    cap_add:
      - CAP_SYS_ADMIN
    security_opt:
      - seccomp:unconfined
    shm_size: "1gb"
    environment:
      EGRESS_CONFIG_BODY: |
        redis:
          address: redis:6379
        api_key: "${LIVEKIT_API_KEY}"
        api_secret: "${LIVEKIT_API_SECRET}"
        ws_url: ws://livekit:7880
        insecure: true
        s3:
          access_key: "${S3_ACCESS_KEY}"
          secret: "${S3_SECRET_KEY}"
          region: "${S3_REGION:-us-east-1}"
          endpoint: http://rustfs:9000
          bucket: "${S3_BUCKET}"
          force_path_style: true
    depends_on:
      redis: {condition: service_healthy}
      livekit: {condition: service_started}
    networks: [zoora]

networks:
  zoora:
    driver: bridge

volumes:
  pgsql-data:
  redis-data:
  rustfs-data:
  letsencrypt:
