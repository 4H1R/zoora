services:
    app:
        build:
            context: .
            dockerfile: Dockerfile.dev
        ports:
            - "${FORWARD_APP_PORT:-8080}:8080"
        env_file:
            - .env
        environment:
            DATABASE_URL: "postgres://${DB_USERNAME:-dev}:${DB_PASSWORD:-dev}@pgsql:5432/${DB_DATABASE:-zoora}?sslmode=disable"
            REDIS_URL: "redis://redis:6379"
            LIVEKIT_HOST: "http://livekit:7880"
            # LIVEKIT_PUBLIC_URL inherited from .env (browser-facing, same on host & container)
            S3_ENDPOINT: "http://rustfs:9000"
        volumes:
            - ".:/app"
            - "go-modules:/go/pkg/mod"
            - "go-build-cache:/root/.cache/go-build"
        working_dir: /app
        networks:
            - zoora
        depends_on:
            pgsql:
                condition: service_healthy
            redis:
                condition: service_healthy
    pgsql:
        image: "postgres:18-alpine"
        ports:
            - "${FORWARD_DB_PORT:-5432}:5432"
        environment:
            PGPASSWORD: "${DB_PASSWORD:-dev}"
            POSTGRES_DB: "${DB_DATABASE:-zoora}"
            POSTGRES_USER: "${DB_USERNAME:-dev}"
            POSTGRES_PASSWORD: "${DB_PASSWORD:-dev}"
        volumes:
            - "pgsql-data:/var/lib/postgresql"
        networks:
            - zoora
        healthcheck:
            test:
                - CMD
                - pg_isready
                - "-q"
                - "-d"
                - "${DB_DATABASE:-zoora}"
                - "-U"
                - "${DB_USERNAME:-dev}"
            retries: 3
            timeout: 5s
    redis:
        image: "redis:alpine"
        ports:
            - "${FORWARD_REDIS_PORT:-6379}:6379"
        volumes:
            - "redis-data:/data"
        networks:
            - zoora
        healthcheck:
            test:
                - CMD
                - redis-cli
                - ping
            retries: 3
            timeout: 5s
    rustfs:
        image: "rustfs/rustfs:latest"
        ports:
            - "${FORWARD_RUSTFS_PORT:-9000}:9000"
            - "${FORWARD_RUSTFS_CONSOLE_PORT:-9001}:9001"
        environment:
            RUSTFS_VOLUMES: /data
            RUSTFS_ADDRESS: "0.0.0.0:9000"
            RUSTFS_CONSOLE_ADDRESS: "0.0.0.0:9001"
            RUSTFS_CONSOLE_ENABLE: "true"
            RUSTFS_EXTERNAL_ADDRESS: ":9000"
            RUSTFS_CORS_ALLOWED_ORIGINS: "*"
            RUSTFS_CONSOLE_CORS_ALLOWED_ORIGINS: "*"
            RUSTFS_ACCESS_KEY: dev
            RUSTFS_SECRET_KEY: dev
            RUSTFS_LOG_LEVEL: info
        volumes:
            - "rustfs-data:/data"
        networks:
            - zoora
        healthcheck:
            test:
                - CMD
                - sh
                - "-c"
                - "curl -f http://127.0.0.1:9000/health && curl -f http://127.0.0.1:9001/health"
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 40s
    livekit:
        image: "livekit/livekit-server:latest"
        ports:
            - "${FORWARD_LIVEKIT_PORT:-7880}:7880"
            - "${FORWARD_LIVEKIT_TCP_PORT:-7881}:7881"
            - "${FORWARD_LIVEKIT_UDP_PORT:-7882}:7882/udp"
        environment:
            LIVEKIT_KEYS: "${LIVEKIT_API_KEY:-devkey}: ${LIVEKIT_API_SECRET:-devsecret}"
            # Redis-backed message bus so the separate egress worker can reach the
            # server over psrpc. The bare --dev flag uses an in-process bus that
            # egress can't join, which makes StartRoomCompositeEgress hang (→ 502).
            LIVEKIT_CONFIG_BODY: |
                redis:
                    address: redis:6379
        command: --dev --bind 0.0.0.0 --node-ip 127.0.0.1
        depends_on:
            redis:
                condition: service_healthy
        networks:
            - zoora
    egress:
        image: "livekit/egress:latest"
        # Room-composite egress renders in headless Chrome; SYS_ADMIN + a larger
        # /dev/shm keep the browser from crashing on start.
        cap_add:
            - CAP_SYS_ADMIN
        security_opt:
            - seccomp:unconfined
        shm_size: "1gb"
        environment:
            EGRESS_CONFIG_BODY: |
                redis:
                    address: redis:6379
                api_key: "${LIVEKIT_API_KEY:-devkey}"
                api_secret: "${LIVEKIT_API_SECRET:-devsecret}"
                ws_url: ws://livekit:7880
                insecure: true
                s3:
                    access_key: "${S3_ACCESS_KEY:-dev}"
                    secret: "${S3_SECRET_KEY:-dev}"
                    region: "${S3_REGION:-us-east-1}"
                    endpoint: http://rustfs:9000
                    bucket: "${S3_BUCKET:-private}"
                    force_path_style: true
        depends_on:
            redis:
                condition: service_healthy
            livekit:
                condition: service_started
        networks:
            - zoora
networks:
    zoora:
        driver: bridge
volumes:
    pgsql-data:
        driver: local
    redis-data:
        driver: local
    rustfs-data:
        driver: local
    go-modules:
        driver: local
    go-build-cache:
        driver: local
